{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CSV Compare{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-800 antialiased">
    <div class="min-h-full flex flex-col">
        <header class="border-b border-slate-200 bg-white/80 backdrop-blur-sm sticky top-0 z-10">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                <a href="{% url 'home' %}" class="flex items-center gap-2.5 group">
                    <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-white shadow-sm group-hover:bg-brand-700 transition-colors">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </span>
                    <span class="font-semibold text-slate-900">CSV Compare</span>
                </a>
                {% block header_action %}{% endblock %}
            </div>
        </header>

        <main class="flex-1 max-w-3xl w-full mx-auto px-4 sm:px-6 py-8">
            {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-slate-200 py-6 text-center text-sm text-slate-500">
            Private set matching — only shared records are revealed.
        </footer>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50">
        <div class="rounded-lg bg-slate-900 text-white px-4 py-3 text-sm shadow-lg"></div>
    </div>

    <script src="{% static 'compare/js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
